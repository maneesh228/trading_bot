broker:
  name: zerodha
  live_trading: false
  market_protection_pct: 2

market:
  exchange: NSE
  poll_interval_seconds: 5
  square_off_time: "15:15"

risk:
  max_trades_per_day: 100
  max_position_value: 10000
  per_trade_stop_loss_pct: 0.6
  per_trade_target_pct: 1.0
  trailing_stop_loss_pct: 0.5
  max_daily_loss_amount: null
  max_daily_losses: 2

execution:
  trade_selection: per_symbol
  position_sizing: max_position_value
  confirm_entries: true
  confirmation:
    require_close_beyond_breakout: true
    min_follow_through_pct: 0.10
    min_close_strength_pct: 70
    require_vwap_side: true
    min_confirmation_volume_ratio: 0.6
    max_confirmation_candles: 2
    strong_trend_pct: 0.40
  retry_after_loss:
    enabled: false
    losses_before_strict: 1
    min_follow_through_pct: 0.20
    min_close_strength_pct: 80
    min_confirmation_volume_ratio: 0.8
  symbol_quality:
    enabled: true
    blocked_symbols:
      - BANKBARODA
      - IDFCFIRSTB
    allowed_symbols: []

watchlist:
  - symbol: ASHOKLEY
    quantity: 1
    strategy: &support_macd_volume_strategy
      name: composite
      mode: all
      strategies:
        - name: support_resistance_breakout
          lookback: 20
          buffer_pct: 0.05
        - name: macd
          fast_window: 12
          slow_window: 26
          signal_window: 9
          mode: trend
        - name: trend_regime
          lookback: 6
          min_trend_pct: 0.15
        - name: time_after
          after: "09:15"
        - name: time_before
          before: "14:30"
        - name: volume_spike
          lookback: 20
          multiplier: 1.3
          min_volume: 50000
        - name: candle_body_filter
          min_body_pct: 10
          reject_flat: true
        - name: vwap_filter
          min_distance_pct: 0.10
  - symbol: AARTIIND
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: MOTHERSON
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: CANBK
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: BANKBARODA
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: WIPRO
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: INFY
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: IDFCFIRSTB
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: SAIL
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: NMDC
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: BHEL
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: BAJFINANCE
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: IRFC
    quantity: 1
    strategy: *support_macd_volume_strategy
