broker:
  name: zerodha
  live_trading: false

market:
  exchange: NSE
  poll_interval_seconds: 5
  square_off_time: "15:15"

risk:
  max_trades_per_day: 6
  max_position_value: 10000
  per_trade_stop_loss_pct: 0.6
  per_trade_target_pct: 1.0

watchlist:
  - symbol: IRCON
    quantity: 72
    strategy:
      name: composite
      mode: all
      strategies:
        - name: open_high_low
          tolerance: 0
        - name: sma_trend_filter
          fast_window: 5
          slow_window: 20
