broker:
  name: zerodha
  live_trading: false

market:
  exchange: NSE
  poll_interval_seconds: 5
  square_off_time: "15:15"

risk:
  max_trades_per_day: 6
  max_position_value: 10000
  per_trade_stop_loss_pct: 0.6
  per_trade_target_pct: 1.0
  trailing_stop_loss_pct: 0.4

execution:
  trade_selection: single_best
  position_sizing: max_position_value

watchlist:
  - symbol: IRCON
    quantity: 1
    strategy: &ohl_sma_strategy
      name: composite
      mode: all
      strategies:
        - name: open_high_low
          tolerance: 0
        - name: sma_trend_filter
          fast_window: 5
          slow_window: 20
  - symbol: ASHOKLEY
    quantity: 1
    strategy: *ohl_sma_strategy
  - symbol: AARTIIND
    quantity: 1
    strategy: *ohl_sma_strategy
  - symbol: MOTHERSON
    quantity: 1
    strategy: *ohl_sma_strategy
  - symbol: CANBK
    quantity: 1
    strategy: *ohl_sma_strategy
  - symbol: PETRONET
    quantity: 1
    strategy: *ohl_sma_strategy
  - symbol: IOC
    quantity: 1
    strategy: *ohl_sma_strategy
