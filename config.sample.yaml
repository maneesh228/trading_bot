broker:
  name: zerodha
  live_trading: false
  market_protection_pct: 2

market:
  exchange: NSE
  poll_interval_seconds: 5
  square_off_time: "15:15"

risk:
  max_trades_per_day: 100
  max_position_value: 10000
  per_trade_stop_loss_pct: 0.6
  per_trade_target_pct: 1.0
  trailing_stop_loss_pct: 0.4

execution:
  trade_selection: per_symbol
  position_sizing: max_position_value

watchlist:
  - symbol: ASHOKLEY
    quantity: 1
    strategy: &support_macd_volume_strategy
      name: composite
      mode: all
      strategies:
        - name: support_resistance_breakout
          lookback: 20
          buffer_pct: 0.05
        - name: macd
          fast_window: 12
          slow_window: 26
          signal_window: 9
          mode: trend
        - name: trend_regime
          lookback: 6
          min_trend_pct: 0.15
        - name: time_after
          after: "09:45"
        - name: time_before
          before: "14:30"
        - name: volume_spike
          lookback: 20
          multiplier: 1.3
          min_volume: 50000
        - name: candle_body_filter
          min_body_pct: 10
          reject_flat: true
        - name: vwap_filter
          min_distance_pct: 0.10
  - symbol: AARTIIND
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: MOTHERSON
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: CANBK
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: BANKBARODA
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: WIPRO
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: INFY
    quantity: 1
    strategy: *support_macd_volume_strategy
  - symbol: IDFCFIRSTB
    quantity: 1
    strategy: *support_macd_volume_strategy
